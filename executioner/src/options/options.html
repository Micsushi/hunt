<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hunt Apply Options</title>
    <style>
      :root {
        --bg: #0f1a14;
        --bg-grad-top: #0f1a14;
        --bg-grad-bottom: #0b120e;
        --panel: #172212;
        --panel-strong: #1d2b18;
        --panel-hover: #223320;
        --ink: #d4f0dc;
        --muted: #9bb69f;
        --ink-inverse: #07100a;
        --line: #2a3f2a;
        --line-strong: #3a5a3a;
        --accent: #59a96a;
        --accent-soft: #1e3a26;
        --accent-ink: #07100a;
        --good: #9bdeac;
        --good-soft: #1a2e1e;
        --warning: #f0b429;
        --warning-soft: #2d2410;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
        --font-sans: "Segoe UI", system-ui, -apple-system, sans-serif;
        --font-mono: Consolas, "SFMono-Regular", "SF Mono", monospace;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-pill: 999px;
        --ease: 140ms ease;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-grad-top) 0%,
          var(--bg-grad-bottom) 100%
        );
        color: var(--ink);
        font-family: var(--font-sans);
        margin: 0;
        padding: 18px 24px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.55rem;
        letter-spacing: 0;
        line-height: 1;
      }

      h2 {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .page {
        display: grid;
        gap: 10px;
        margin: 0 auto;
        max-width: 1180px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow);
        padding: 12px 14px;
      }

      form {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .grid {
        display: grid;
        gap: 9px 10px;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      label {
        color: var(--muted);
        display: grid;
        font-size: 0.72rem;
        font-weight: 650;
        gap: 4px;
      }

      input,
      textarea,
      select {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        color: var(--ink);
        font: inherit;
        font-size: 0.82rem;
        font-weight: 400;
        letter-spacing: 0;
        min-height: 30px;
        padding: 5px 8px;
      }

      textarea {
        min-height: 58px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus,
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .checkboxes {
        display: grid;
        gap: 6px 12px;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }

      .checkbox {
        align-items: center;
        background: transparent;
        border: 0;
        border-radius: 0;
        color: var(--ink);
        display: flex;
        font-size: 0.82rem;
        font-weight: 400;
        gap: 6px;
        min-height: 22px;
        padding: 0;
        text-transform: none;
      }

      .checkbox input {
        margin: 0;
        width: 14px;
        height: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        min-height: 30px;
        padding: 5px 10px;
        transition:
          background 160ms ease-out,
          border-color 160ms ease-out,
          transform 160ms ease-out;
      }

      button:hover {
        background: var(--accent-soft);
        border-color: var(--line-strong);
      }

      button:active {
        transform: translateY(1px);
      }

      .status {
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 0.78rem;
        font-weight: 500;
        padding: 7px 9px;
      }

      .status.info {
        background: var(--panel-strong);
        border-left: 4px solid var(--accent);
        color: var(--muted);
      }

      .status.warn {
        background: var(--warning-soft);
        border-color: var(--warning);
        color: var(--warning);
      }

      .hero {
        align-items: end;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 0 2px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.66rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      .subtle {
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 0.72rem;
        margin-top: 4px;
      }

      .split {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1fr);
      }

      .file-row {
        align-items: end;
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(220px, 1fr) auto;
      }

      .log-list {
        background: #101a11;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        display: grid;
        gap: 4px;
        margin-top: 8px;
        max-height: min(420px, 52vh);
        overflow-y: auto;
        padding: 6px;
        scrollbar-color: var(--line-strong) #101a11;
        scrollbar-width: thin;
      }

      .log-list::-webkit-scrollbar {
        width: 10px;
      }

      .log-list::-webkit-scrollbar-thumb {
        background: var(--line-strong);
        border: 2px solid #101a11;
        border-radius: var(--radius-pill);
      }

      .log-list::-webkit-scrollbar-track {
        background: #101a11;
      }

      .log-toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .log-toolbar .actions {
        gap: 8px;
      }

      .log-count {
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 0.72rem;
      }

      .log-entry {
        align-items: start;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        display: grid;
        gap: 10px;
        grid-template-columns: 170px 190px minmax(0, 1fr);
        min-height: 34px;
        padding: 7px 10px;
      }

      .log-time,
      .log-action,
      .log-summary {
        font-size: 0.75rem;
        line-height: 1.3;
      }

      .log-time,
      .log-action {
        color: var(--muted);
        font-family: var(--font-mono);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .log-summary {
        color: var(--ink);
        overflow-wrap: anywhere;
      }

      .empty-log {
        color: var(--muted);
        font-size: 0.8rem;
        padding: 8px;
      }

      @media (max-width: 720px) {
        body {
          padding: 14px;
        }

        .hero,
        .file-row {
          align-items: stretch;
          display: grid;
        }

        .log-toolbar {
          align-items: stretch;
          display: grid;
        }

        .log-entry {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="hero">
        <div>
          <div class="eyebrow">C3 Executioner</div>
          <h1>Hunt Apply Options</h1>
          <p class="subtle">
            Profile, resume, and apply context for browser fills.
          </p>
        </div>
        <button id="reload-extension" type="button">Reload Extension</button>
      </div>

      <div id="options-status" class="status info">
        Loading extension state...
      </div>

      <section class="panel">
        <h2>Behavior Settings</h2>
        <form id="settings-form">
          <div class="checkboxes">
            <label class="checkbox">
              <input
                id="autofill-on-load"
                name="autofillOnLoad"
                type="checkbox"
              />
              <span>Autofill on page load</span>
            </label>
            <label class="checkbox">
              <input
                id="manual-fill-enabled"
                name="manualFillEnabled"
                type="checkbox"
              />
              <span>Manual fill enabled</span>
            </label>
            <label class="checkbox">
              <input
                id="auto-prompt-enabled"
                name="autoPromptEnabled"
                type="checkbox"
              />
              <span>Prompt on signup/ATS pages</span>
            </label>
            <label class="checkbox">
              <input
                id="fill-required-only"
                name="fillRequiredOnly"
                type="checkbox"
              />
              <span>Fill required fields only</span>
            </label>
            <label class="checkbox">
              <input
                id="auto-export-logs"
                name="autoExportLogs"
                type="checkbox"
              />
              <span>Download JSON logs after fills</span>
            </label>
            <label class="checkbox">
              <input
                id="debug-log-sink-enabled"
                name="debugLogSinkEnabled"
                type="checkbox"
              />
              <span>Local debug log sink</span>
            </label>
            <label class="checkbox">
              <input
                id="c4-polling-enabled"
                name="c4PollingEnabled"
                type="checkbox"
              />
              <span>C4 polling enabled</span>
            </label>
            <label class="checkbox">
              <input
                id="one-active-run-lock"
                name="oneActiveRunLock"
                type="checkbox"
              />
              <span>One active run lock</span>
            </label>
            <label class="checkbox">
              <input
                id="allow-generated-answers"
                name="allowGeneratedAnswers"
                type="checkbox"
              />
              <span>Allow generated answers</span>
            </label>
            <label class="checkbox">
              <input
                id="flag-low-confidence-answers"
                name="flagLowConfidenceAnswers"
                type="checkbox"
              />
              <span>Flag low-confidence answers</span>
            </label>
            <label class="checkbox">
              <input
                id="strip-long-dash"
                name="stripLongDash"
                type="checkbox"
              />
              <span>Strip long-dash punctuation</span>
            </label>
          </div>
          <div class="grid">
            <label>
              Backend URL
              <input id="backend-url" name="backendUrl" type="url" />
            </label>
            <label>
              Service token
              <input id="service-token" name="serviceToken" type="password" />
            </label>
            <label>
              Poll interval seconds
              <input
                id="poll-interval-seconds"
                name="pollIntervalSeconds"
                min="30"
                max="3600"
                type="number"
              />
            </label>
            <label>
              Heartbeat interval seconds
              <input
                id="heartbeat-interval-seconds"
                name="heartbeatIntervalSeconds"
                min="30"
                max="3600"
                type="number"
              />
            </label>
            <label>
              Auto-export folder
              <input
                id="auto-export-log-prefix"
                name="autoExportLogPrefix"
                type="text"
              />
            </label>
          </div>
          <div class="actions">
            <button type="submit">Save Settings</button>
            <button id="poll-c4-once" type="button">Poll C4 Once</button>
            <button id="test-debug-log-sink" type="button">
              Test Log Sink
            </button>
            <button id="export-logs-now" type="button">Export Logs Now</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Candidate Profile</h2>
        <form id="profile-form">
          <div class="grid">
            <label>
              Full name
              <input id="profile-full-name" name="fullName" type="text" />
            </label>
            <label>
              Email
              <input id="profile-email" name="email" type="email" />
            </label>
            <label>
              Phone
              <input id="profile-phone" name="phone" type="text" />
            </label>
            <label>
              Location
              <input id="profile-location" name="location" type="text" />
            </label>
            <label>
              LinkedIn URL
              <input id="profile-linkedin-url" name="linkedinUrl" type="url" />
            </label>
            <label>
              GitHub URL
              <input id="profile-github-url" name="githubUrl" type="url" />
            </label>
            <label>
              Website URL
              <input id="profile-website-url" name="websiteUrl" type="url" />
            </label>
            <label>
              Co-op terms completed
              <input
                id="profile-coop-terms-completed"
                name="coOpTermsCompleted"
                min="0"
                max="9"
                type="number"
              />
            </label>
            <label>
              Expected graduation year
              <input
                id="profile-expected-graduation-year"
                name="expectedGraduationYear"
                min="2020"
                max="2040"
                type="number"
              />
            </label>
            <label>
              Available Summer 2026
              <select
                id="profile-available-summer-2026"
                name="availableSummer2026"
              >
                <option value="">Manual</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </label>
            <label>
              Available interview window
              <select
                id="profile-available-interview-window"
                name="availableInterviewWindow"
              >
                <option value="">Manual</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </label>
            <label>
              Previous employers
              <input
                id="profile-previous-employers"
                name="previousEmployers"
                type="text"
              />
            </label>
          </div>
          <div class="checkboxes">
            <label class="checkbox">
              <input
                id="profile-work-authorized"
                name="workAuthorized"
                type="checkbox"
              />
              <span>Work authorized</span>
            </label>
            <label class="checkbox">
              <input
                id="profile-sponsorship-required"
                name="sponsorshipRequired"
                type="checkbox"
              />
              <span>Sponsorship required</span>
            </label>
            <label class="checkbox">
              <input
                id="profile-willing-to-relocate"
                name="willingToRelocate"
                type="checkbox"
              />
              <span>Willing to relocate</span>
            </label>
            <label class="checkbox">
              <input
                id="profile-open-to-any-location"
                name="openToAnyLocation"
                type="checkbox"
              />
              <span>Open to any location</span>
            </label>
            <label class="checkbox">
              <input
                id="profile-salary-flexible"
                name="salaryFlexible"
                type="checkbox"
              />
              <span>Salary flexible</span>
            </label>
          </div>
          <label>
            Notes
            <textarea id="profile-notes" name="notes"></textarea>
          </label>
          <div class="file-row">
            <label>
              Import profile from TeX resume
              <input
                id="profile-tex-file"
                name="profileTexFile"
                type="file"
                accept=".tex,text/x-tex,text/plain"
              />
            </label>
            <button id="import-profile-tex" type="button">
              Import Profile From TeX
            </button>
          </div>
          <div class="actions">
            <button type="submit">Save Profile</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Default Resume</h2>
        <form id="resume-form">
          <div class="grid">
            <label>
              Label
              <input id="resume-label" name="label" type="text" />
            </label>
            <label>
              Source type
              <select id="resume-source-type" name="sourceType">
                <option value="manual_default">manual_default</option>
                <option value="c2_selected">c2_selected</option>
              </select>
            </label>
            <label>
              PDF path
              <input id="resume-pdf-path" name="pdfPath" type="text" />
            </label>
            <label>
              TeX path
              <input id="resume-tex-path" name="texPath" type="text" />
            </label>
            <label>
              Version id
              <input id="resume-version-id" name="versionId" type="text" />
            </label>
            <label>
              Job id
              <input id="resume-job-id" name="jobId" type="text" />
            </label>
            <label>
              Import PDF
              <input
                id="resume-pdf-file"
                name="pdfFile"
                type="file"
                accept="application/pdf"
              />
            </label>
          </div>
          <div class="actions">
            <button type="submit">Save Default Resume</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Apply Context Import</h2>
        <form id="apply-context-form">
          <label>
            Apply context JSON
            <textarea
              id="apply-context-json"
              name="applyContextJson"
            ></textarea>
          </label>
          <div class="actions">
            <button type="submit">Import Apply Context</button>
            <button id="clear-imported-context" type="button">
              Clear Active Context
            </button>
          </div>
        </form>
      </section>

      <section class="panel activity-panel">
        <div class="log-toolbar">
          <div>
            <h2>Activity Log</h2>
            <div id="activity-log-count" class="log-count">0 entries</div>
          </div>
          <div class="actions">
            <button id="export-activity-log" type="button">Export JSON</button>
            <button id="clear-activity-log" type="button">Clear Log</button>
          </div>
        </div>
        <div id="activity-log" class="log-list"></div>
      </section>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
