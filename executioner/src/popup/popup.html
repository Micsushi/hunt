<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hunt Apply</title>
    <style>
      :root {
        --bg: #0f1a14;
        --bg-grad-top: #0f1a14;
        --bg-grad-bottom: #0b120e;
        --panel: #172212;
        --panel-strong: #1d2b18;
        --panel-hover: #223320;
        --ink: #d4f0dc;
        --muted: #9bb69f;
        --ink-inverse: #07100a;
        --line: #2a3f2a;
        --line-strong: #3a5a3a;
        --accent: #59a96a;
        --accent-soft: #1e3a26;
        --accent-ink: #07100a;
        --good: #9bdeac;
        --good-soft: #1a2e1e;
        --warning: #f0b429;
        --warning-soft: #2d2410;
        --font-sans: "Segoe UI", system-ui, -apple-system, sans-serif;
        --font-mono: Consolas, "SFMono-Regular", "SF Mono", monospace;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-pill: 999px;
        --ease: 140ms ease;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-grad-top) 0%,
          var(--bg-grad-bottom) 100%
        );
        color: var(--ink);
        font-family: var(--font-sans);
        margin: 0;
        min-width: 340px;
        padding: 10px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        letter-spacing: 0;
      }

      h2 {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 9px 10px;
      }

      .summary-card {
        background: var(--panel-strong);
        border-color: var(--line);
        color: var(--ink);
      }

      .summary-card .label,
      .summary-card .muted {
        color: var(--muted);
      }

      .summary-grid {
        display: grid;
        gap: 6px 8px;
        grid-template-columns: 1fr 1fr;
        margin-top: 7px;
      }

      .span-all {
        grid-column: 1 / -1;
      }

      .label {
        color: var(--muted);
        display: block;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.08em;
        margin-bottom: 2px;
        text-transform: uppercase;
      }

      .value {
        font-size: 12px;
        font-weight: 650;
        line-height: 1.18;
        word-break: break-word;
      }

      .compact-row {
        align-items: start;
        display: grid;
        gap: 7px;
        grid-template-columns: 78px minmax(0, 1fr);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        color: var(--ink);
        cursor: pointer;
        flex: 1 1 auto;
        font: inherit;
        font-size: 12px;
        font-weight: 750;
        min-height: 32px;
        padding: 6px 9px;
        transition:
          background 160ms ease-out,
          border-color 160ms ease-out,
          transform 160ms ease-out;
      }

      button.secondary {
        background: transparent;
        color: var(--ink);
      }

      button:hover {
        background: var(--accent-soft);
        border-color: var(--line-strong);
        color: var(--ink);
      }

      button:active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .muted {
        color: var(--muted);
        font-size: 11px;
      }

      .status {
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 11px;
        font-weight: 500;
        padding: 7px 8px;
      }

      .status.info {
        background: var(--panel-strong);
        border-left: 4px solid var(--accent);
        color: var(--muted);
      }

      .status.warn {
        background: var(--warning-soft);
        border-color: var(--warning);
        color: var(--warning);
      }

      .header {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .mark {
        align-items: center;
        background: var(--accent);
        border-radius: var(--radius-sm);
        color: var(--accent-ink);
        display: grid;
        font-weight: 850;
        height: 30px;
        place-items: center;
        width: 30px;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="header">
        <div class="mark">H</div>
        <div>
          <h1>Hunt Apply</h1>
          <p class="muted">C3 Executioner</p>
        </div>
      </div>

      <div id="popup-status" class="status info">
        Loading extension state...
      </div>

      <section class="card summary-card">
        <h2>Active Context</h2>
        <div class="summary-grid">
          <div>
            <span class="label">Job ID</span>
            <div id="active-job-id" class="value">None</div>
          </div>
          <div>
            <span class="label">Apply URL</span>
            <div id="active-apply-url" class="value">None</div>
          </div>
          <div class="span-all">
            <span class="label">Selected Resume</span>
            <div id="active-resume-path" class="value">None</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Defaults</h2>
        <div class="stack" style="margin-top: 10px">
          <div class="compact-row">
            <span class="label">Profile</span>
            <div id="profile-name" class="value">Not set</div>
          </div>
          <div class="compact-row">
            <span class="label">Default Resume</span>
            <div id="default-resume-path" class="value">Not set</div>
          </div>
          <div class="compact-row">
            <span class="label">Autofill On Load</span>
            <div id="autofill-on-load" class="value">Disabled</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Latest Attempt</h2>
        <div class="stack" style="margin-top: 10px">
          <div class="compact-row">
            <span class="label">Status</span>
            <div id="latest-attempt-status" class="value">None</div>
          </div>
          <div class="compact-row">
            <span class="label">Summary</span>
            <div id="latest-attempt-summary" class="value">
              No attempts logged.
            </div>
          </div>
        </div>
      </section>

      <div class="actions">
        <button id="fill-now" type="button">Fill Current Page</button>
        <button id="open-options" class="secondary" type="button">
          Open Options
        </button>
        <button id="clear-context" class="secondary" type="button">
          Clear Context
        </button>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
