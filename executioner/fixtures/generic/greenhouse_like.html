<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>C3 Generic Greenhouse-like Fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 32px;
        max-width: 820px;
      }

      .application-field {
        border: 1px solid #d7d7d7;
        border-radius: 6px;
        margin: 18px 0;
        padding: 14px 18px;
      }

      .field-label {
        font-weight: 700;
        margin-bottom: 10px;
      }

      .required {
        color: #c12525;
      }

      input,
      [role="textbox"] {
        border: 0;
        display: block;
        font: inherit;
        min-height: 28px;
        outline: 0;
        width: 100%;
      }

      .resume-block {
        margin: 20px 0;
      }

      .resume-actions {
        border: 1px solid #5b87e5;
        border-radius: 28px;
        color: #4c75d8;
        padding: 12px;
        text-align: center;
        width: 380px;
      }

      #resume-file {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Apply for this job</h1>
    <p><span class="required">*</span> indicates a required field</p>

    <form>
      <div class="application-field">
        <div class="field-label">
          First Name <span class="required">*</span>
        </div>
        <div><input id="first-name" autocomplete="given-name" /></div>
      </div>

      <div class="application-field">
        <div class="field-label">Last Name <span class="required">*</span></div>
        <div><input id="last-name" /></div>
      </div>

      <div class="application-field">
        <div class="field-label">Preferred First Name</div>
        <div><input id="preferred-first-name" /></div>
      </div>

      <div class="application-field">
        <div class="field-label">Email <span class="required">*</span></div>
        <div><input id="email-address" type="email" /></div>
      </div>

      <div class="application-field">
        <div class="field-label">Phone</div>
        <div><input id="phone-number" /></div>
      </div>

      <div class="application-field">
        <div class="field-label">
          LinkedIn Profile <span class="required">*</span>
        </div>
        <div role="textbox" id="linkedin-box" contenteditable="true"></div>
      </div>

      <div class="resume-block">
        <div class="field-label">Resume/CV</div>
        <div class="resume-actions">Attach</div>
        <input
          id="resume-file"
          name="resume"
          type="file"
          accept="application/pdf"
        />
      </div>

      <div class="resume-block">
        <div class="field-label">Cover Letter</div>
        <div class="resume-actions">Attach</div>
        <input
          id="cover-letter-file"
          name="cover_letter"
          type="file"
          accept="application/pdf"
        />
      </div>
    </form>
  </body>
</html>
