name: CI

on:
  push:
  pull_request:

jobs:
  hunter-cli-smoke:
    name: Hunter CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hunter runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hunter/requirements.txt

      - name: Run standalone launcher smoke on Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x hunter.sh scripts/launchers/hunter.sh
          ./hunter.sh queue
          if ./hunter.sh definitely-not-a-command >/tmp/hunter-invalid.log 2>&1; then
            cat /tmp/hunter-invalid.log
            exit 1
          fi

      - name: Run standalone launcher smoke on Windows PowerShell
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          .\hunter.ps1 queue
          .\hunter.ps1 definitely-not-a-command *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "hunter.ps1 should return a non-zero exit code for an invalid command."
          }

      - name: Run standalone launcher smoke on Windows cmd
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          hunter.cmd queue
          hunter.cmd definitely-not-a-command >NUL 2>&1
          if %ERRORLEVEL% EQU 0 exit /b 1

  ui-cli-smoke:
    name: UI CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hunter/requirements.txt

      - name: Run standalone launcher smoke on Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x ui.sh scripts/launchers/ui.sh
          ./ui.sh --help
          if ./ui.sh definitely-not-a-command >/tmp/ui-invalid.log 2>&1; then
            cat /tmp/ui-invalid.log
            exit 1
          fi

      - name: Run standalone launcher smoke on Windows PowerShell
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          .\ui.ps1 --help
          .\ui.ps1 definitely-not-a-command *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "ui.ps1 should return a non-zero exit code for an invalid command."
          }

      - name: Run standalone launcher smoke on Windows cmd
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          ui.cmd --help
          ui.cmd definitely-not-a-command >NUL 2>&1
          if %ERRORLEVEL% EQU 0 exit /b 1

  fletch-cli-smoke:
    name: Fletch CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hunter/requirements.txt

      - name: Run standalone launcher smoke on Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x fletch.sh scripts/launchers/fletch.sh
          ./fletch.sh --help
          if ./fletch.sh definitely-not-a-command >/tmp/fletch-invalid.log 2>&1; then
            cat /tmp/fletch-invalid.log
            exit 1
          fi

      - name: Run standalone launcher smoke on Windows PowerShell
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          .\fletch.ps1 --help
          .\fletch.ps1 definitely-not-a-command *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "fletch.ps1 should return a non-zero exit code for an invalid command."
          }

      - name: Run standalone launcher smoke on Windows cmd
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          fletch.cmd --help
          fletch.cmd definitely-not-a-command >NUL 2>&1
          if %ERRORLEVEL% EQU 0 exit /b 1

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hunter/requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest httpx fastapi

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run full CI
        run: python ci.py
