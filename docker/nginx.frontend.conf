server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver — required for variable-based proxy_pass
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $backend "${BACKEND_HOST}:${BACKEND_PORT}";

    # Proxy API, auth, health, legacy routes to the backend container
    location ~* ^/(auth|api|health|metrics|legacy) {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Immutable SPA asset bundles
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA catch-all — all unmatched paths serve index.html
    location / {
        try_files $uri /index.html;
    }
}
